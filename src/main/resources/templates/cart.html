<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="header :: head('Cart')"></head>

<body>
	<div th:replace="header :: navbar"></div>

	<section class="py-5">
		<div class="container">
			<h2 class="section-title mb-4">Shopping Cart</h2>
			<div class="row g-4">
				<div class="col-lg-8">
					<div class="card-soft p-4">
						<div class="d-flex align-items-center justify-content-between border-bottom pb-3 mb-3">
							<div class="d-flex gap-3 align-items-center">
								<img src="/images/product-placeholder.jpg" width="90" class="rounded-3" alt="">
								<div>
									<h6 class="mb-1">Crochet Flower Bouquet</h6>
									<small class="text-muted">Premium handmade item</small>
								</div>
							</div>
							<div>
								<div class="price mb-2">₹999</div>
								<div class="d-flex align-items-center gap-2">
									<button class="btn btn-outline-primary btn-sm">-</button>
									<input type="text" class="form-control qty-input" value="1">
									<button class="btn btn-outline-primary btn-sm">+</button>
									<button class="btn btn-outline-danger btn-sm ms-2">Delete</button>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="col-lg-4">
					<div class="card-soft p-4">
						<h5 class="fw-bold mb-3">Order Summary</h5>
						<div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span>₹999</span></div>
						<div class="d-flex justify-content-between mb-2"><span>Shipping</span><span>₹99</span></div>
						<div class="d-flex justify-content-between mb-2"><span>Tax</span><span>₹30</span></div>
						<hr>
						<div class="d-flex justify-content-between fw-bold fs-5"><span>Total</span><span>₹1128</span>
						</div>
						<a th:href="@{/checkout}" class="btn btn-primary w-100 mt-3">Proceed to Checkout</a>
					</div>
				</div>
			</div>
		</div>
	</section>

	<div th:replace="footer :: footer"></div>
	<div th:replace="scripts :: scripts"></div>
</body>

</html>
