<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">



<link rel="icon" type="image/x-icon" th:href="@{/uploads/favicon-v2.ico}">
<link rel="icon" type="image/svg+xml" th:href="@{/uploads/favicon-v2.svg}">
<link rel="icon" type="image/png" sizes="32x32" th:href="@{/uploads/favicon-v2-32x32.png}">
<link rel="icon" type="image/png" sizes="16x16" th:href="@{/uploads/favicon-v2-16x16.png}">
<link rel="apple-touch-icon" th:href="@{/uploads/apple-touch-icon-v2.png}">


<head th:replace="header :: head('Admin Dashboard')"></head>

<body>
	<div th:replace="header :: navbar"></div>

	<section class="py-5">
		<div class="container">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<div>
					<h1 class="section-title mb-1">Admin Dashboard</h1>
					<p class="text-muted mb-0">Overview of store activity</p>
				</div>
				<a th:href="@{/logout}" class="btn btn-outline-primary">Logout</a>
			</div>

			<div class="row g-4">
				<div class="col-md-3">
					<div class="card-soft p-4">
						<h6 class="text-muted">Products</h6>
						<h2 class="fw-bold mb-0">24</h2>
					</div>
				</div>
				<div class="col-md-3">
					<div class="card-soft p-4">
						<h6 class="text-muted">Orders</h6>
						<h2 class="fw-bold mb-0">18</h2>
					</div>
				</div>
				<div class="col-md-3">
					<div class="card-soft p-4">
						<h6 class="text-muted">Revenue</h6>
						<h2 class="fw-bold mb-0">₹45,000</h2>
					</div>
				</div>
				<div class="col-md-3">
					<div class="card-soft p-4">
						<h6 class="text-muted">Customers</h6>
						<h2 class="fw-bold mb-0">132</h2>
					</div>
				</div>
			</div>
		</div>
	</section>

	<div th:replace="footer :: footer"></div>
	<div th:replace="scripts :: scripts"></div>
</body>

</html>
