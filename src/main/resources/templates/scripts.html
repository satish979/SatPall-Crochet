<div th:fragment="scripts">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/app.js}"></script>
</div>


<!-- Cart Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080">
	<div id="cartToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
		<div class="d-flex">
			<div class="toast-body d-flex align-items-center gap-2">
				<i class="fa-solid fa-circle-check text-success"></i>
				<span id="cartToastMsg">Added to cart</span>
			</div>
			<a href="/cart" class="btn btn-primary btn-sm my-auto me-2 flex-shrink-0" id="cartToastViewBtn">
				View Cart
			</a>
			<button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
		</div>
	</div>
</div>
