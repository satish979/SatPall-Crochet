<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	

<link rel="icon" type="image/x-icon" th:href="@{/uploads/favicon-v2.ico}">
<link rel="icon" type="image/svg+xml" th:href="@{/uploads/favicon-v2.svg}">
<link rel="icon" type="image/png" sizes="32x32" th:href="@{/uploads/favicon-v2-32x32.png}">
<link rel="icon" type="image/png" sizes="16x16" th:href="@{/uploads/favicon-v2-16x16.png}">
<link rel="apple-touch-icon" th:href="@{/uploads/apple-touch-icon-v2.png}">

<head th:fragment="head(pageTitle)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${pageTitle} + ' | SatPall Crochet'">SatPall Crochet</title>
	<meta name="description" content="Premium handmade crochet products">
	<meta property="og:title" content="SatPall Crochet">
	<meta property="og:description" content="Premium handmade crochet products">
	<meta property="og:type" content="website">
	<link rel="icon" type="image/png" href="/images/favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
		rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
	<link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top">
	<div class="container">
		<a class="navbar-brand" th:href="@{/}">
			<i class="fa-solid fa-spa me-2"></i>SatPall Crochet
		</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="mainNav">
			<ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
				<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/shop}">Shop</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
				<li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>
				<li class="nav-item">
					<a class="btn btn-primary btn-sm ms-lg-2" th:href="@{/cart}">
						<i class="fa-solid fa-bag-shopping me-1"></i>Cart
					</a>
				</li>
			</ul>
		</div>
	</div>
</nav>

</html>
