<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="header :: head('Admin Login')"></head>

<body>
	<div class="container py-5">
		<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
			<div class="col-12 col-md-8 col-lg-5">
				<div class="card-soft p-4 p-md-5">
					<div class="text-center mb-4">
						<h2 class="section-title mb-2">Admin Login</h2>
						<p class="text-muted mb-0">Sign in to manage SatPall Crochet</p>
					</div>

					<div th:if="${param.error}" class="alert alert-danger">
						Invalid username or password.
					</div>

					<div th:if="${param.logout}" class="alert alert-success">
						You have been logged out successfully.
					</div>

					<form th:action="@{/admin/login}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<div class="mb-3">
							<label class="form-label">Username</label>
							<input type="text" name="username" class="form-control" placeholder="Enter username"
								required>
						</div>

						<div class="mb-3">
							<label class="form-label">Password</label>
							<input type="password" name="password" class="form-control" placeholder="Enter password"
								required>
						</div>

						<button type="submit" class="btn btn-primary w-100">Login</button>
					</form>

					<div class="text-center mt-4">
						<a th:href="@{/}" class="text-decoration-none">← Back to website</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div th:replace="scripts :: scripts"></div>
</body>

</html>
