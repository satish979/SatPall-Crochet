<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="/header :: head('Admin Login')"></head>

<body class="bg-light">

	<section class="min-vh-100 d-flex align-items-center py-5"
		style="background: linear-gradient(135deg, #fdf2f4 0%, #fffaf9 50%, #f6eef8 100%);">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-12 col-lg-10 col-xl-9">
					<div class="card border-0 shadow-lg overflow-hidden" style="border-radius: 28px;">
						<div class="row g-0">

							<div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center p-5"
								style="background: linear-gradient(135deg, #c97b84 0%, #7d5ba6 100%);">
								<div class="text-center text-white px-3">
									<i class="fa-solid fa-spa mb-4" style="font-size: 4rem;"></i>
									<h1 class="fw-bold mb-3">SatPall Crochet</h1>
									<p class="mb-0 opacity-75">
										Manage products, orders, categories, and store content from your admin panel.
									</p>
								</div>
							</div>

							<div class="col-lg-6 p-4 p-md-5 bg-white">
								<div class="mb-4">
									<span class="badge rounded-pill px-3 py-2"
										style="background: rgba(201,123,132,.12); color: #a85d68;">
										Admin Access
									</span>
									<h2 class="fw-bold mt-3 mb-2">Welcome back</h2>
									<p class="text-muted mb-0">Sign in to continue to your dashboard.</p>
								</div>

								<div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2">
									<i class="fa-solid fa-circle-exclamation"></i>
									<span>Invalid username or password.</span>
								</div>

								<div th:if="${param.logout}"
									class="alert alert-success d-flex align-items-center gap-2">
									<i class="fa-solid fa-circle-check"></i>
									<span>You have been logged out successfully.</span>
								</div>

								<form th:action="@{/admin/login}" method="post" autocomplete="off">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

									<div class="mb-3">
										<label class="form-label fw-semibold">Username</label>
										<div class="input-group">
											<span class="input-group-text bg-white"><i
													class="fa-regular fa-user"></i></span>
											<input type="text" name="username" class="form-control form-control-lg"
												placeholder="Enter username" required autofocus>
										</div>
									</div>

									<div class="mb-3">
										<label class="form-label fw-semibold">Password</label>
										<div class="input-group">
											<span class="input-group-text bg-white"><i
													class="fa-solid fa-lock"></i></span>
											<input type="password" name="password" class="form-control form-control-lg"
												placeholder="Enter password" required>
										</div>
									</div>

									<div class="d-flex justify-content-between align-items-center mb-4">
										<div class="form-check">
											<input class="form-check-input" type="checkbox" id="rememberMe">
											<label class="form-check-label" for="rememberMe">Remember me</label>
										</div>
										<a href="#" class="text-decoration-none small" style="color: #a85d68;">Forgot
											password?</a>
									</div>

									<button type="submit" class="btn btn-primary btn-lg w-100 py-3">
										<i class="fa-solid fa-right-to-bracket me-2"></i> Login
									</button>
								</form>

								<div class="text-center mt-4">
									<a th:href="@{/}" class="text-decoration-none" style="color: #a85d68;">
										<i class="fa-solid fa-arrow-left me-1"></i> Back to website
									</a>
								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<div th:replace="/scripts :: scripts"></div>
</body>

</html>
